<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 84" width="60" height="84">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Card body -->
  <rect x="0.5" y="0.5" width="59" height="83" rx="4" ry="4"
        fill="#ffffff" stroke="#cccccc" stroke-width="0.5" filter="url(#shadow)"/>
  <!-- Top-left rank and suit -->
  <text x="5" y="13" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">5</text>
  <text x="5" y="23" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a">♠</text>
  <!-- Bottom-right rank and suit (rotated) -->
  <g transform="rotate(180, 30, 42)">
    <text x="5" y="13" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">5</text>
    <text x="5" y="23" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a">♠</text>
  </g>
  <!-- Center content -->
  <text x="18" y="25" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#1a1a1a">♠</text>
    <text x="42" y="25" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#1a1a1a">♠</text>
    <text x="30" y="42" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#1a1a1a">♠</text>
    <text x="18" y="59" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#1a1a1a">♠</text>
    <text x="42" y="59" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#1a1a1a">♠</text>
</svg>